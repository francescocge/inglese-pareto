<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Inglese Pareto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FDF8F2;--warm:#F5ECD7;--warm2:#EDE0C8;
  --gold:#C8923A;--gold-l:#E8B96A;--gold-d:#A07030;
  --brown:#7A5C3A;--dark:#2E1F0E;
  --green:#3A7D52;--red:#B84040;--blue:#2B6CB0;
  --shadow:0 4px 20px rgba(120,80,30,.13);
  --shadow-sm:0 2px 10px rgba(120,80,30,.08);
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:"Nunito",sans-serif;background:var(--cream);color:var(--dark)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%}
.page-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 16px)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:#fff;border-top:1px solid var(--warm2);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(120,80,30,.08)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:color .2s;color:var(--brown);opacity:.5;font-size:.6rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border:none;background:transparent;font-family:"Nunito",sans-serif;padding-bottom:env(safe-area-inset-bottom)}
.nav-tab.active{color:var(--gold);opacity:1}
.nav-icon{font-size:1.35rem;line-height:1}

/* ── SECTIONS ── */
.section{display:none}
.section.active{display:block}

/* ── CONTAINER ── */
.container{max-width:580px;margin:0 auto;padding:20px 16px}

/* ── HEADER ── */
.top-bar{background:linear-gradient(135deg,#2E1F0E,#5C3A1A);padding:22px 20px 18px;text-align:center}
.top-bar h1{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,4.5vw,1.9rem);color:var(--gold-l);margin-bottom:3px}
.top-bar p{font-size:.78rem;color:rgba(255,255,255,.55);font-weight:300}

/* ── CARDS ── */
.card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.card-title{font-family:"Playfair Display",serif;font-size:1rem;color:var(--dark);margin-bottom:12px}

/* ── DASHBOARD ── */
.welcome-card{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:22px;color:#fff;margin-bottom:14px}
.welcome-card h2{font-family:"Playfair Display",serif;font-size:1.35rem;color:var(--gold-l);margin-bottom:6px}
.welcome-card p{font-size:.82rem;opacity:.7;line-height:1.5}
.stats-row{display:flex;gap:10px;margin-top:14px}
.stat-box{flex:1;background:rgba(255,255,255,.1);border-radius:12px;padding:10px;text-align:center}
.stat-box .val{font-size:1.5rem;font-weight:800;color:var(--gold-l);display:block}
.stat-box .lbl{font-size:.65rem;opacity:.65;text-transform:uppercase;letter-spacing:.5px}

.prog-row{margin-bottom:12px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-name{font-size:.82rem;font-weight:700;color:var(--dark)}
.prog-pct{font-size:.78rem;font-weight:800;color:var(--gold)}
.prog-bar{height:7px;background:var(--warm);border-radius:4px}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .6s}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.quick-btn{background:#fff;border-radius:16px;padding:15px 10px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer;border:2px solid transparent;transition:all .2s}
.quick-btn:active{transform:scale(.96)}
.quick-btn .qi{font-size:1.8rem;margin-bottom:5px}
.quick-btn .qn{font-size:.8rem;font-weight:800;color:var(--dark)}
.quick-btn .qs{font-size:.68rem;color:var(--brown);margin-top:2px}

/* ── PIANO ── */
.dots-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.dot{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:var(--brown);cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.done{background:var(--green);border-color:var(--green);color:#fff}
.dot.current{background:var(--gold);border-color:var(--gold);color:#fff;transform:scale(1.15)}
.dot.locked{opacity:.3;cursor:default}

.month-hero{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:20px;color:#fff;margin-bottom:14px}
.month-tag{display:inline-block;background:var(--gold);color:#fff;font-size:.68rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:9px}
.month-hero h2{font-family:"Playfair Display",serif;font-size:1.35rem;color:var(--gold-l);margin-bottom:6px}
.month-hero .goal{font-size:.82rem;opacity:.78;line-height:1.55;margin-bottom:13px}
.m-stats{display:flex;gap:8px;flex-wrap:wrap}
.m-stat{background:rgba(255,255,255,.1);border-radius:10px;padding:7px 12px;font-size:.76rem;font-weight:700}
.m-stat span{display:block;font-size:1rem;color:var(--gold-l)}

.time-block{display:flex;gap:12px;align-items:flex-start;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--warm)}
.time-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tbadge{background:var(--gold);color:#fff;border-radius:9px;padding:4px 10px;font-size:.72rem;font-weight:800;white-space:nowrap;flex-shrink:0;margin-top:2px}
.tbadge.blue{background:var(--blue)}
.tbadge.green{background:var(--green)}
.tinfo h4{font-size:.88rem;font-weight:800;margin-bottom:2px}
.tinfo p{font-size:.76rem;color:var(--brown);line-height:1.45}

.word-chip{display:inline-flex;align-items:center;gap:5px;background:var(--warm);border-radius:20px;padding:6px 12px;margin:3px;font-size:.8rem;font-weight:700;border:1px solid rgba(200,146,58,.28);cursor:pointer;transition:all .2s}
.word-chip:active{background:var(--gold);color:#fff}
.word-chip .ph{font-size:.68rem;opacity:.65;font-style:italic}

.tip-row{display:flex;gap:9px;margin-bottom:9px;font-size:.8rem;line-height:1.5}
.tip-row:last-child{margin-bottom:0}
.tip-row .tip-icon{font-size:1.1rem;flex-shrink:0}

.nav-month{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.nav-month button{background:var(--gold);color:#fff;border:none;border-radius:12px;padding:10px 18px;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .2s;font-family:"Nunito",sans-serif}
.nav-month button:disabled{opacity:.3;cursor:default}
.nav-month button:active:not(:disabled){transform:scale(.95)}
.nav-month .nm-center{font-size:.78rem;color:var(--brown);font-weight:700}

.month-done-btn{background:var(--green);color:#fff;border:none;border-radius:16px;padding:14px;font-size:.9rem;font-weight:800;cursor:pointer;width:100%;transition:all .2s;font-family:"Nunito",sans-serif;margin-top:14px}
.month-done-btn:active{transform:scale(.98)}

/* ── ESERCIZI ── */
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.level-card{background:#fff;border-radius:18px;box-shadow:var(--shadow-sm);padding:16px;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative}
.level-card:active{transform:scale(.97)}
.level-card.locked{opacity:.4;cursor:default}
.level-card .level-num{font-size:2rem;margin-bottom:4px}
.level-card .level-name{font-size:.82rem;font-weight:800;color:var(--dark);margin-bottom:8px}
.level-card .level-prog{font-size:.72rem;color:var(--brown);margin-bottom:8px}
.level-card .level-stars{font-size:.9rem}
.level-lock{position:absolute;top:10px;right:10px;font-size:1.2rem;opacity:.3}

.modes-wrap{margin-bottom:14px}
.mode-row{background:#fff;border-radius:16px;box-shadow:var(--shadow-sm);padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;border:2px solid transparent;transition:all .2s}
.mode-row:active{transform:scale(.98)}
.mode-row .mode-icon{font-size:1.8rem;flex-shrink:0}
.mode-row .mode-info{flex:1}
.mode-row .mode-name{font-size:.88rem;font-weight:800;color:var(--dark);margin-bottom:2px}
.mode-row .mode-desc{font-size:.72rem;color:var(--brown)}
.mode-row .mode-score{font-size:.78rem;font-weight:800;color:var(--gold);margin-left:auto;flex-shrink:0}

.ex-header{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:18px;color:#fff;margin-bottom:14px}
.ex-header .ex-title{font-family:"Playfair Display",serif;font-size:1.2rem;color:var(--gold-l);margin-bottom:8px}
.ex-header .ex-prog{font-size:.76rem;opacity:.7}

.ex-card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:20px;margin-bottom:14px;text-align:center}
.ex-card .question{font-size:1.1rem;font-weight:800;color:var(--dark);margin-bottom:20px;line-height:1.5}
.ex-card .answer{font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:16px}

.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.opt-btn{background:var(--warm);border:2px solid var(--gold);border-radius:14px;padding:14px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:"Nunito",sans-serif;color:var(--dark)}
.opt-btn:active{transform:scale(.96)}
.opt-btn.correct{background:var(--green);color:#fff;border-color:var(--green)}
.opt-btn.wrong{background:var(--red);color:#fff;border-color:var(--red)}

.input-ans{width:100%;padding:14px;font-size:1rem;border:2px solid var(--gold);border-radius:14px;margin-bottom:14px;font-family:"Nunito",sans-serif;background:var(--warm)}
.input-ans:focus{outline:none;border-color:var(--gold-d)}

.ex-btn{background:var(--gold);color:#fff;border:none;border-radius:14px;padding:14px 24px;font-size:.9rem;font-weight:800;cursor:pointer;transition:all .2s;font-family:"Nunito",sans-serif}
.ex-btn:active{transform:scale(.96)}
.ex-btn.green{background:var(--green)}
.ex-btn.blue{background:var(--blue)}

.words-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px}
.word-tile{background:var(--warm);border:2px solid var(--gold);border-radius:12px;padding:10px 16px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;font-family:"Nunito",sans-serif;color:var(--dark)}
.word-tile:active{transform:scale(.95)}
.word-tile.used{opacity:.3;cursor:default}

.built-sentence{min-height:60px;background:var(--warm2);border-radius:14px;padding:14px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center}
.built-word{background:#fff;border:1px solid var(--gold);border-radius:8px;padding:6px 12px;font-size:.88rem;font-weight:700;color:var(--dark)}

.score-card{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:24px;color:#fff;text-align:center;margin-bottom:14px}
.score-card .score-icon{font-size:3.5rem;margin-bottom:10px}
.score-card .score-val{font-size:3rem;font-weight:800;color:var(--gold-l);margin-bottom:6px}
.score-card .score-label{font-size:.9rem;opacity:.7;margin-bottom:16px}
.score-card .score-stars{font-size:1.8rem;margin-bottom:16px}
.score-btns{display:flex;gap:10px;justify-content:center}

/* ── DIZIONARIO ── */
.dict-search{width:100%;padding:14px;font-size:1rem;border:2px solid var(--gold);border-radius:14px;margin-bottom:14px;font-family:"Nunito",sans-serif;background:#fff}
.dict-search:focus{outline:none;border-color:var(--gold-d)}

.dict-add{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.dict-input{width:100%;padding:10px;font-size:.88rem;border:1px solid var(--warm2);border-radius:10px;margin-bottom:8px;font-family:"Nunito",sans-serif}
.dict-input:focus{outline:none;border-color:var(--gold)}

.dict-list{margin-bottom:14px}
.dict-item{background:#fff;border-radius:14px;box-shadow:var(--shadow-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.dict-item .dit{flex:1;font-size:.88rem;font-weight:700;color:var(--dark)}
.dict-item .den{flex:1;font-size:.88rem;color:var(--brown)}
.dict-item .dph{font-size:.72rem;color:var(--gold);font-style:italic;margin-left:auto}
.dict-item .dspk{font-size:1.2rem;cursor:pointer;flex-shrink:0}
.dict-item .ddel{font-size:1rem;cursor:pointer;flex-shrink:0;opacity:.5}

/* ── GUIDA ── */
.guida-intro{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:20px;color:#fff;margin-bottom:14px}
.guida-intro h2{font-family:"Playfair Display",serif;font-size:1.3rem;color:var(--gold-l);margin-bottom:8px}
.guida-intro p{font-size:.82rem;opacity:.78;line-height:1.6}

.guida-sec{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.guida-sec-head{display:flex;gap:12px;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--warm)}
.guida-icon{font-size:1.8rem}
.guida-sec-title{font-size:.95rem;font-weight:800;color:var(--dark)}
.guida-sec-sub{font-size:.72rem;color:var(--brown);margin-top:2px}

.gstep{display:flex;gap:10px;margin-bottom:10px}
.gstep-num{background:var(--gold);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;margin-top:2px}
.gstep-text{font-size:.8rem;line-height:1.5;color:var(--dark)}

.mode-row-g{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--warm2)}
.mode-row-g:last-child{border-bottom:none;padding-bottom:0;margin-bottom:0}
.mode-row-g-icon{font-size:1.5rem;flex-shrink:0;margin-top:2px}
.mode-row-g-info{flex:1}
.mode-row-g-info strong{display:block;font-size:.85rem;color:var(--dark);margin-bottom:2px}
.mode-row-g-info span{font-size:.75rem;color:var(--brown);line-height:1.4}

.routine-g{background:var(--warm);border-radius:16px;padding:16px;margin-bottom:14px}
.routine-g h3{font-size:.95rem;font-weight:800;color:var(--dark);margin-bottom:10px}
.routine-row-g{display:flex;gap:10px;margin-bottom:8px;font-size:.8rem;line-height:1.5}
.routine-row-g:last-child{margin-bottom:0}
.routine-row-g .ttime{background:var(--gold);color:#fff;border-radius:8px;padding:3px 8px;font-size:.7rem;font-weight:800;flex-shrink:0;margin-top:2px}

.save-g{background:var(--warm);border-radius:16px;padding:16px;margin-bottom:14px}
.save-g h3{font-size:.95rem;font-weight:800;color:var(--dark);margin-bottom:10px}
.save-row-g{font-size:.8rem;line-height:1.6;color:var(--dark);margin-bottom:6px}
.save-row-g:last-child{margin-bottom:0}

.install-g{background:var(--warm);border-radius:16px;padding:16px;margin-bottom:14px}
.install-g h3{font-size:.95rem;font-weight:800;color:var(--dark);margin-bottom:10px}
.device-g{padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid rgba(120,80,30,.15)}
.device-g:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.device-g-name{font-size:.85rem;font-weight:800;color:var(--gold);margin-bottom:6px}
.device-g-step{font-size:.78rem;color:var(--dark);line-height:1.5;margin-bottom:4px}
.device-g-step:last-child{margin-bottom:0}

/* ── AI FRASI ── */
.ai-input-wrap{margin-bottom:14px}
.ai-input{width:100%;padding:12px;font-size:.88rem;border:2px solid var(--gold);border-radius:12px;font-family:"Nunito",sans-serif;background:var(--warm);min-height:80px;resize:vertical}
.ai-input:focus{outline:none;border-color:var(--gold-d)}

.ai-result{background:var(--warm2);border-radius:14px;padding:14px;margin-bottom:14px}
.ai-result-title{font-size:.85rem;font-weight:800;color:var(--dark);margin-bottom:8px}
.ai-result-text{font-size:.88rem;color:var(--dark);line-height:1.6;white-space:pre-wrap}

.ai-loading{background:var(--warm2);border-radius:14px;padding:20px;text-align:center;margin-bottom:14px}
.ai-loading-icon{font-size:2rem;margin-bottom:8px;animation:spin 1s linear infinite}
.ai-loading-text{font-size:.82rem;color:var(--brown)}
@keyframes spin{to{transform:rotate(360deg)}}

.ai-error{background:#FFE5E5;border:2px solid var(--red);border-radius:14px;padding:14px;margin-bottom:14px}
.ai-error-text{font-size:.82rem;color:var(--red);font-weight:700}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <h1>Inglese Pareto</h1>
    <p>950+ parole · 12 mesi · 20 min/giorno</p>
  </div>

  <div class="page-wrap">
    <section id="sec-home" class="section active">
      <div class="container" id="homeContent"></div>
    </section>

    <section id="sec-piano" class="section">
      <div class="container" id="pianoContent"></div>
    </section>

    <section id="sec-esercizi" class="section">
      <div class="container" id="eserciziContent"></div>
    </section>

    <section id="sec-dizionario" class="section">
      <div class="container" id="dizionarioContent"></div>
    </section>

    <section id="sec-guida" class="section">
      <div class="container" id="guidaContent"></div>
    </section>
  </div>

  <div class="bottom-nav">
    <button class="nav-tab active" onclick="showSection('home', this)">
      <div class="nav-icon">🏠</div>
      <div>Home</div>
    </button>
    <button class="nav-tab" onclick="showSection('piano', this)">
      <div class="nav-icon">📅</div>
      <div>Piano</div>
    </button>
    <button class="nav-tab" onclick="showSection('esercizi', this)">
      <div class="nav-icon">✏️</div>
      <div>Esercizi</div>
    </button>
    <button class="nav-tab" onclick="showSection('dizionario', this)">
      <div class="nav-icon">📖</div>
      <div>Dizionario</div>
    </button>
    <button class="nav-tab" onclick="showSection('guida', this)">
      <div class="nav-icon">❓</div>
      <div>Guida</div>
    </button>
  </div>
</div>

<script>
// ======================================================
// DATA: VOCABOLARIO 12 MESI (951+ PAROLE A1→A2)

// ======================================================

// ======================================================
function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.78;
  speechSynthesis.speak(u);
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function pct(a,b){ return b>0?Math.round(a/b*100):0; }
function escQ(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function starStr(n){ var s=''; for(var i=0;i<3;i++) s+=(i<n?'⭐':'☆'); return s; }

function saveScore(lvl,mode,score,total){
  var p=total>0?score/total:0;
  var key='ip_'+lvl+'_'+mode;
  var prev=parseFloat(localStorage.getItem(key)||'0');
  if(p>prev) localStorage.setItem(key, p.toFixed(2));
}
function getScore(lvl,mode){
  var v=localStorage.getItem('ip_'+lvl+'_'+mode);
  return v!==null?parseFloat(v):null;
}
function getLevelProg(lvl){
  var modes=['flashcard','quiz','completa','costruttore','dettato'];
  var cnt=0;
  modes.forEach(function(m){ if(getScore(lvl,m)!==null) cnt++; });
  return cnt/modes.length;
}
function getLevelStars(lvl){
  var modes=['flashcard','quiz','completa','costruttore','dettato'];
  var done=[];
  modes.forEach(function(m){ var s=getScore(lvl,m); if(s!==null) done.push(s); });
  if(!done.length) return 0;
  var avg=done.reduce(function(a,b){return a+b;},0)/done.length;
  if(avg>=0.9) return 3; if(avg>=0.6) return 2; return 1;
}

// Sblocco mese: Quiz ≥ 70%
function isMonthUnlocked(monthIdx){
  if(monthIdx===0) return true;
  var prevQuiz=getScore(monthIdx-1, 'quiz');
  return prevQuiz!==null && prevQuiz>=0.7;
}

// Streak
function getStreak(){
  var today=new Date(); today.setHours(0,0,0,0);
  var last=localStorage.getItem('lastStudy');
  var streak=parseInt(localStorage.getItem('streak')||'0');
  if(!last) return streak;
  var lastD=new Date(parseInt(last)); lastD.setHours(0,0,0,0);
  var diff=(today-lastD)/(1000*60*60*24);
  if(diff>1) return 0;
  return streak;
}
function markStudyToday(){
  var today=new Date(); today.setHours(0,0,0,0);
  var last=localStorage.getItem('lastStudy');
  var streak=parseInt(localStorage.getItem('streak')||'0');
  if(last){
    var lastD=new Date(parseInt(last)); lastD.setHours(0,0,0,0);
    var diff=(today-lastD)/(1000*60*60*24);
    if(diff===1) streak++;
    else if(diff>1) streak=1;
  } else { streak=1; }
  localStorage.setItem('streak',streak);
  localStorage.setItem('lastStudy',today.getTime());
}

function showSection(id, tabEl){
  document.querySelectorAll('.section').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('sec-'+id).classList.add('active');
  
  document.querySelectorAll('.nav-tab').forEach(function(el){ el.classList.remove('active'); });
  if(tabEl) tabEl.classList.add('active');
  else{
    var tabs=['home','piano','esercizi','dizionario','guida'];
    var idx=tabs.indexOf(id);
    if(idx>=0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  }
  
  if(id==='home') renderHome();
  else if(id==='piano') renderPiano();
  else if(id==='esercizi') renderLevels();
  else if(id==='dizionario') renderDict();
  else if(id==='guida') renderGuida();
}

function gotoEsercizi(lvl, mode){
  showSection('esercizi', null);
  if(lvl!==undefined){
    EX.level=lvl;
    if(mode) startMode(mode);
    else renderModes();
  }
}

function pianoGoMonth(idx){
  if(idx<0 || idx>=12) return;
  if(!isMonthUnlocked(idx)){
    alert('Questo mese è bloccato. Devi completare il Quiz del mese precedente con almeno 70% per sbloccarlo.');
    return;
  }
  pianoMonth=idx;
  localStorage.setItem('pianoMonth', pianoMonth);
  renderPiano();
}

function monthDone(){
  if(pianoMonth===11){
    alert('Congratulazioni! Hai completato tutti i 12 mesi! 🎉');
    return;
  }
  var nextMonth=pianoMonth+1;
  if(!isMonthUnlocked(nextMonth)){
    alert('Per sbloccare il mese successivo, devi completare il Quiz di questo mese con almeno 70%.');
    return;
  }
  pianoMonth=nextMonth;
  localStorage.setItem('pianoMonth', pianoMonth);
  renderPiano();
  alert('Passato al Mese '+(pianoMonth+1)+'! 🎉');
}

function startMode(mode){
  EX.mode=mode;
  EX.idx=0;
  EX.score=0;
  EX.total=0;
  EX.answered=false;
  EX.fcRevealed=false;
  EX.aiPrompt='';
  EX.aiResult='';
  EX.aiLoading=false;
  EX.aiError='';
  
  var vocab=MONTHS[EX.level].vocab;
  if(mode==='flashcard'){
    EX.queue=shuffle(vocab);
    renderFlashcard();
  } else if(mode==='quiz'){
    EX.queue=shuffle(vocab);
    renderQuiz();
  } else if(mode==='completa'){
    EX.queue=shuffle(vocab);
    renderCompleta();
  } else if(mode==='costruttore'){
    EX.queue=shuffle(vocab);
    renderCostruttore();
  } else if(mode==='dettato'){
    EX.queue=shuffle(vocab);
    renderDettato();
  } else if(mode==='aifrasi'){
    renderAIFrasi();
  }
  
  markStudyToday();
}

// ======================================================
// QUIZ
// ======================================================
function renderQuiz(){
  if(EX.idx>=EX.queue.length){ renderScore(); return; }
  var w=EX.queue[EX.idx];
  var prog=(EX.idx+1)+'/'+EX.queue.length;
  
  var allW=MONTHS[EX.level].vocab;
  var opts=[w.en];
  var others=allW.filter(function(x){ return x.en!==w.en; });
  others=shuffle(others).slice(0,3);
  others.forEach(function(x){ opts.push(x.en); });
  opts=shuffle(opts);
  
  var html='';
  html+='<div class="ex-header">';
  html+='<div class="ex-title">❓ Quiz · Mese '+(EX.level+1)+'</div>';
  html+='<div class="ex-prog">Domanda '+prog+'</div>';
  html+='</div>';
  
  html+='<div class="ex-card">';
  html+='<div class="question">'+w.it+'</div>';
  html+='</div>';
  
  html+='<div class="opts-grid">';
  opts.forEach(function(opt){
    var cls='opt-btn';
    var click='onclick="quizCheck(\''+escQ(opt)+'\')"';
    if(EX.answered){
      if(opt===w.en) cls+=' correct';
      else if(opt===EX.userAnswer) cls+=' wrong';
      click='';
    }
    html+='<div class="'+cls+'" '+click+'>'+opt+'</div>';
  });
  html+='</div>';
  
  if(EX.answered){
    html+='<div style="text-align:center;margin-top:14px">';
    html+='<button class="ex-btn green" onclick="quizNext()">Prossima domanda →</button>';
    html+='</div>';
  }
  
  document.getElementById('eserciziContent').innerHTML=html;
}

function quizCheck(ans){
  if(EX.answered) return;
  var w=EX.queue[EX.idx];
  EX.userAnswer=ans;
  EX.answered=true;
  EX.total++;
  if(ans===w.en){ EX.score++; }
  renderQuiz();
  
  setTimeout(function(){
    quizNext();
  }, 1200);
}

function quizNext(){
  EX.idx++;
  EX.answered=false;
  EX.userAnswer='';
  renderQuiz();
}

function renderCostruttore(){
  if(EX.idx>=EX.queue.length){ renderScore(); return; }
  var w=EX.queue[EX.idx];
  var prog=(EX.idx+1)+'/'+EX.queue.length;
  
  if(!EX.cosAllWords.length){
    var templates=[
      ['I','have','a'],
      ['This','is','my'],
      ['Do','you','want'],
      ['I','need','a'],
      ['The','is','here'],
      ['Where','is','the'],
      ['Can','you','see','the'],
      ['I','like','this']
    ];
    var tpl=templates[Math.floor(Math.random()*templates.length)];
    var words=tpl.slice();
    words.push(w.en);
    EX.cosAllWords=shuffle(words);
    EX.cosUsed=[];
    EX.cosBuilt=[];
  }
  
  var html='';
  html+='<div class="ex-header">';
  html+='<div class="ex-title">🧩 Costruttore di frasi · Mese '+(EX.level+1)+'</div>';
  html+='<div class="ex-prog">Frase '+prog+'</div>';
  html+='</div>';
  
  html+='<div class="ex-card">';
  html+='<div class="question">'+w.it+'</div>';
  html+='<p style="font-size:.8rem;color:var(--brown);margin-top:8px">Costruisci la frase toccando le parole nell\'ordine giusto</p>';
  html+='</div>';
  
  html+='<div class="built-sentence" id="builtSent">';
  if(!EX.cosBuilt.length){
    html+='<span style="opacity:.5;font-size:.85rem">Tocca le parole sotto...</span>';
  } else {
    EX.cosBuilt.forEach(function(wd){
      html+='<div class="built-word">'+wd+'</div>';
    });
  }
  html+='</div>';
  
  html+='<div class="words-grid">';
  EX.cosAllWords.forEach(function(wd,i){
    var used=EX.cosUsed.indexOf(i)>=0;
    var cls='word-tile'+(used?' used':'');
    var click=used?'':'onclick="cosAddWord('+i+')"';
    html+='<div class="'+cls+'" '+click+'>'+wd+'</div>';
  });
  html+='</div>';
  
  if(!EX.answered){
    html+='<div style="text-align:center;margin-top:14px">';
    html+='<button class="ex-btn" onclick="cosReset()" style="background:var(--red);margin-right:8px">🔄 Ricomincia</button>';
    html+='<button class="ex-btn" onclick="cosCheck()">Verifica frase</button>';
    html+='</div>';
  } else {
    var builtSent=EX.cosBuilt.join(' ');
    var correct=(builtSent.toLowerCase().indexOf(w.en.toLowerCase())>=0);
    html+='<div class="ex-card" style="background:'+(correct?'var(--green)':'var(--red)')+';color:#fff;margin-top:14px">';
    html+='<div style="font-size:1rem;margin-bottom:8px">'+(correct?'✅ Corretto!':'❌ Sbagliato')+'</div>';
    html+='<div>La parola era: <strong>'+w.en+'</strong></div>';
    html+='</div>';
    html+='<div style="text-align:center;margin-top:14px">';
    html+='<button class="ex-btn green" onclick="cosNext()">Prossima frase →</button>';
    html+='</div>';
  }
  
  document.getElementById('eserciziContent').innerHTML=html;
}

function cosAddWord(idx){
  EX.cosBuilt.push(EX.cosAllWords[idx]);
  EX.cosUsed.push(idx);
  renderCostruttore();
}

function cosReset(){
  EX.cosBuilt=[];
  EX.cosUsed=[];
  renderCostruttore();
}

function cosCheck(){
  EX.answered=true;
  EX.total++;
  var w=EX.queue[EX.idx];
  var builtSent=EX.cosBuilt.join(' ');
  if(builtSent.toLowerCase().indexOf(w.en.toLowerCase())>=0){ EX.score++; }
  renderCostruttore();
}

function cosNext(){
  EX.idx++;
  EX.answered=false;
  EX.cosAllWords=[];
  EX.cosUsed=[];
  EX.cosBuilt=[];
  renderCostruttore();
}

function aiGenerate(){
  var promptEl=document.getElementById('aiPromptInput');
  if(!promptEl) return;
  var prompt=promptEl.value.trim();
  if(!prompt){
    alert('Scrivi cosa vuoi esercitare!');
    return;
  }
  
  EX.aiPrompt=prompt;
  EX.aiLoading=true;
  EX.aiResult='';
  EX.aiError='';
  renderAIFrasi();
  
  var vocab=MONTHS[EX.level].vocab;
  var vocabList=vocab.map(function(w){ return w.it+' = '+w.en; }).join(', ');
  
  var systemPrompt='Tu sei un insegnante di inglese. L\'utente sta studiando il mese '+(EX.level+1)+' del suo percorso. Le parole di questo mese sono: '+vocabList+'. Genera esercizi pratici e utili in base alla richiesta dell\'utente. Rispondi in italiano e inglese dove necessario. Sii conciso e pratico.';
  
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: [
        { role: 'user', content: prompt }
      ]
    })
  })
  .then(function(response){
    if(!response.ok){
      throw new Error('Errore API: ' + response.status);
    }
    return response.json();
  })
  .then(function(data){
    if(data.content && data.content[0] && data.content[0].text){
      EX.aiResult=data.content[0].text;
      EX.aiLoading=false;
      renderAIFrasi();
    } else {
      throw new Error('Risposta API non valida');
    }
  })
  .catch(function(error){
    EX.aiError='Errore: '+error.message+'. Verifica la connessione e riprova.';
    EX.aiLoading=false;
    renderAIFrasi();
  });
}

function aiReset(){
  EX.aiPrompt='';
  EX.aiResult='';
  EX.aiError='';
  EX.aiLoading=false;
  renderAIFrasi();
}

// ======================================================
// DIZIONARIO
// ======================================================
function renderDict(){
  var custom=JSON.parse(localStorage.getItem('customWords')||'[]');
  var allWords=[];
  MONTHS.forEach(function(m){
    m.vocab.forEach(function(w){
      allWords.push({it:w.it,en:w.en,ph:w.ph||'',custom:false});
    });
  });
  custom.forEach(function(w){
    allWords.push({it:w.it,en:w.en,ph:w.ph||'',custom:true});
  });
  
  var search=(localStorage.getItem('dictSearch')||'').toLowerCase();
  var filtered=allWords;
  if(search){
    filtered=allWords.filter(function(w){
      return w.it.toLowerCase().indexOf(search)>=0 || w.en.toLowerCase().indexOf(search)>=0;
    });
  }
  
  var html='';
  html+='<div class="card"><div class="card-title">📖 Dizionario Personale</div>';
  html+='<p style="font-size:.8rem;color:var(--brown)">Tutte le parole del corso + le tue aggiunte personali</p>';
  html+='</div>';
  
  html+='<input class="dict-search" type="text" placeholder="🔍 Cerca parola..." value="'+search+'" oninput="dictSearch(this.value)">';
  
  html+='<div class="dict-add">';
  html+='<input class="dict-input" id="dictIt" type="text" placeholder="Italiano">';
  html+='<input class="dict-input" id="dictEn" type="text" placeholder="Inglese">';
  html+='<input class="dict-input" id="dictPh" type="text" placeholder="Pronuncia (opzionale)">';
  html+='<button class="ex-btn green" onclick="dictAdd()" style="width:100%;margin-top:8px">➕ Aggiungi parola</button>';
  html+='</div>';
  
  html+='<div class="dict-list">';
  if(!filtered.length){
    html+='<p style="text-align:center;padding:20px;color:var(--brown)">Nessuna parola trovata</p>';
  } else {
    filtered.forEach(function(w,i){
      html+='<div class="dict-item">';
      html+='<div class="dit">'+w.it+'</div>';
      html+='<div class="den">'+w.en+'</div>';
      if(w.ph) html+='<div class="dph">'+w.ph+'</div>';
      html+='<div class="dspk" onclick="speak(\''+escQ(w.en)+'\')">🔊</div>';
      if(w.custom){
        html+='<div class="ddel" onclick="dictDel('+i+')">🗑️</div>';
      }
      html+='</div>';
    });
  }
  html+='</div>';
  
  document.getElementById('dizionarioContent').innerHTML=html;
}

function dictSearch(val){
  localStorage.setItem('dictSearch', val);
  renderDict();
}

function dictAdd(){
  var it=document.getElementById('dictIt').value.trim();
  var en=document.getElementById('dictEn').value.trim();
  var ph=document.getElementById('dictPh').value.trim();
  if(!it || !en){
    alert('Compila almeno italiano e inglese');
    return;
  }
  var custom=JSON.parse(localStorage.getItem('customWords')||'[]');
  custom.push({it:it,en:en,ph:ph});
  localStorage.setItem('customWords', JSON.stringify(custom));
  renderDict();
}

function dictDel(idx){
  var custom=JSON.parse(localStorage.getItem('customWords')||'[]');
  if(!confirm('Eliminare questa parola?')) return;
  custom.splice(idx, 1);
  localStorage.setItem('customWords', JSON.stringify(custom));
  renderDict();
}
