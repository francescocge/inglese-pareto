<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Inglese Pareto</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FDF8F2;--warm:#F5ECD7;--warm2:#EDE0C8;
  --gold:#C8923A;--gold-l:#E8B96A;--gold-d:#A07030;
  --brown:#7A5C3A;--dark:#2E1F0E;
  --green:#3A7D52;--red:#B84040;--blue:#2B6CB0;
  --shadow:0 4px 20px rgba(120,80,30,.13);
  --shadow-sm:0 2px 10px rgba(120,80,30,.08);
  --nav-h:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:"Nunito",sans-serif;background:var(--cream);color:var(--dark)}

/* ── LAYOUT ── */
#app{display:flex;flex-direction:column;height:100%}
.page-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + 16px)}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:#fff;border-top:1px solid var(--warm2);display:flex;z-index:100;box-shadow:0 -2px 12px rgba(120,80,30,.08)}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:color .2s;color:var(--brown);opacity:.5;font-size:.6rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;border:none;background:transparent;font-family:"Nunito",sans-serif;padding-bottom:env(safe-area-inset-bottom)}
.nav-tab.active{color:var(--gold);opacity:1}
.nav-icon{font-size:1.35rem;line-height:1}

/* ── SECTIONS ── */
.section{display:none}
.section.active{display:block}

/* ── CONTAINER ── */
.container{max-width:580px;margin:0 auto;padding:20px 16px}

/* ── HEADER ── */
.top-bar{background:linear-gradient(135deg,#2E1F0E,#5C3A1A);padding:22px 20px 18px;text-align:center}
.top-bar h1{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,4.5vw,1.9rem);color:var(--gold-l);margin-bottom:3px}
.top-bar p{font-size:.78rem;color:rgba(255,255,255,.55);font-weight:300}

/* ── CARDS ── */
.card{background:#fff;border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
.card-title{font-family:"Playfair Display",serif;font-size:1rem;color:var(--dark);margin-bottom:12px}

/* ── DASHBOARD ── */
.welcome-card{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:22px;color:#fff;margin-bottom:14px}
.welcome-card h2{font-family:"Playfair Display",serif;font-size:1.35rem;color:var(--gold-l);margin-bottom:6px}
.welcome-card p{font-size:.82rem;opacity:.7;line-height:1.5}
.stats-row{display:flex;gap:10px;margin-top:14px}
.stat-box{flex:1;background:rgba(255,255,255,.1);border-radius:12px;padding:10px;text-align:center}
.stat-box .val{font-size:1.5rem;font-weight:800;color:var(--gold-l);display:block}
.stat-box .lbl{font-size:.65rem;opacity:.65;text-transform:uppercase;letter-spacing:.5px}

.prog-row{margin-bottom:12px}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-name{font-size:.82rem;font-weight:700;color:var(--dark)}
.prog-pct{font-size:.78rem;font-weight:800;color:var(--gold)}
.prog-bar{height:7px;background:var(--warm);border-radius:4px}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold-l));transition:width .6s}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.quick-btn{background:#fff;border-radius:16px;padding:15px 10px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer;border:2px solid transparent;transition:all .2s}
.quick-btn:active{transform:scale(.96)}
.quick-btn .qi{font-size:1.8rem;margin-bottom:5px}
.quick-btn .qn{font-size:.8rem;font-weight:800;color:var(--dark)}
.quick-btn .qs{font-size:.68rem;color:var(--brown);margin-top:2px}

/* ── PIANO ── */
.dots-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.dot{width:34px;height:34px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:var(--brown);cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.done{background:var(--green);border-color:var(--green);color:#fff}
.dot.current{background:var(--gold);border-color:var(--gold);color:#fff;transform:scale(1.15)}
.dot.locked{opacity:.3;cursor:default}

.month-hero{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:20px;color:#fff;margin-bottom:14px}
.month-tag{display:inline-block;background:var(--gold);color:#fff;font-size:.68rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:9px}
.month-hero h2{font-family:"Playfair Display",serif;font-size:1.35rem;color:var(--gold-l);margin-bottom:6px}
.month-hero .goal{font-size:.82rem;opacity:.78;line-height:1.55;margin-bottom:13px}
.m-stats{display:flex;gap:8px;flex-wrap:wrap}
.m-stat{background:rgba(255,255,255,.1);border-radius:10px;padding:7px 12px;font-size:.76rem;font-weight:700}
.m-stat span{display:block;font-size:1rem;color:var(--gold-l)}

.time-block{display:flex;gap:12px;align-items:flex-start;margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--warm)}
.time-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.tbadge{background:var(--gold);color:#fff;border-radius:9px;padding:4px 10px;font-size:.72rem;font-weight:800;white-space:nowrap;flex-shrink:0;margin-top:2px}
.tbadge.blue{background:var(--blue)}
.tbadge.green{background:var(--green)}
.tinfo h4{font-size:.88rem;font-weight:800;margin-bottom:2px}
.tinfo p{font-size:.76rem;color:var(--brown);line-height:1.45}

.word-chip{display:inline-flex;align-items:center;gap:5px;background:var(--warm);border-radius:20px;padding:6px 12px;margin:3px;font-size:.8rem;font-weight:700;border:1px solid rgba(200,146,58,.28);cursor:pointer;transition:all .2s}
.word-chip:active{background:var(--gold);color:#fff}
.word-chip .ph{font-size:.68rem;opacity:.65;font-style:italic}

.tip-row{display:flex;gap:9px;margin-bottom:9px;font-size:.8rem;line-height:1.5}
.tip-row:last-child{margin-bottom:0}

.extra-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:18px;color:#fff}
.extra-box h3{font-family:"Playfair Display",serif;font-size:1rem;color:#E8B96A;margin-bottom:10px}
.extra-tip{font-size:.8rem;opacity:.8;line-height:1.5;margin-bottom:7px;padding-left:14px;position:relative}
.extra-tip::before{content:"›";position:absolute;left:0;color:#E8B96A;font-weight:800}

.month-nav-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px}

/* ── ESERCIZI ── */
.level-card{background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;display:flex;gap:13px;align-items:center;transition:transform .15s}
.level-card:active{transform:scale(.97)}
.lv-icon{font-size:1.9rem;width:42px;text-align:center;flex-shrink:0}
.lv-info{flex:1;min-width:0}
.lv-name{font-family:"Playfair Display",serif;font-size:.97rem;margin-bottom:1px}
.lv-sub{font-size:.73rem;color:var(--brown);margin-bottom:5px}
.lv-meta{display:flex;justify-content:space-between;margin-bottom:5px}
.lv-prog{height:4px;background:var(--warm);border-radius:2px}
.lv-pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:2px;transition:width .5s}

.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mode-cell{background:#fff;border-radius:15px;padding:15px 10px;text-align:center;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .15s;border:2px solid transparent}
.mode-cell:active{transform:scale(.95)}
.mode-cell .mi{font-size:1.7rem;margin-bottom:5px}
.mode-cell .mn{font-size:.82rem;font-weight:800;margin-bottom:2px}
.mode-cell .md{font-size:.7rem;color:var(--brown)}
.mode-badge{display:inline-block;background:var(--gold);color:#fff;border-radius:9px;padding:2px 8px;font-size:.63rem;font-weight:800;margin-top:4px}

/* EX HEADER */
.ex-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ex-ctr{font-size:.78rem;color:var(--brown);font-weight:800}
.ex-sc{font-size:.78rem;color:var(--green);font-weight:800}
.ex-prog{background:var(--warm);height:6px;border-radius:3px;margin-bottom:18px}
.ex-prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px;transition:width .35s}

/* FLASHCARD */
.fc{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:34px 22px;text-align:center;cursor:pointer;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:background .3s;margin-bottom:16px}
.fc.revealed{background:linear-gradient(135deg,#163a5c,var(--blue))}
.fc-lbl{font-size:.65rem;letter-spacing:2px;text-transform:uppercase;opacity:.5;margin-bottom:6px;color:#fff;font-weight:700}
.fc-word{font-family:"Playfair Display",serif;font-size:clamp(1.5rem,5.5vw,2rem);color:var(--gold-l);line-height:1.2}
.fc-ph{font-size:.88rem;color:rgba(255,255,255,.5);margin-top:5px;font-style:italic}
.fc-hint{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:12px}

/* QUIZ */
.quiz-q{background:#fff;border-radius:18px;padding:18px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow)}
.quiz-lbl{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--brown);opacity:.65;margin-bottom:7px;font-weight:700}
.quiz-it{font-family:"Playfair Display",serif;font-size:clamp(1.3rem,4.5vw,1.7rem);color:var(--dark);line-height:1.3}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qopt{background:#fff;border:2px solid var(--warm);border-radius:13px;padding:13px 8px;font-family:"Nunito",sans-serif;font-size:.86rem;font-weight:800;color:var(--dark);cursor:pointer;line-height:1.3;box-shadow:var(--shadow-sm);transition:all .2s}
.qopt.correct{background:var(--green)!important;border-color:var(--green)!important;color:#fff!important}
.qopt.wrong{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}
.qopt:disabled{cursor:default}

/* COMPLETA */
.cpl-box{background:#fff;border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.cpl-it{font-size:.8rem;color:var(--brown);font-style:italic;margin-bottom:9px;padding-bottom:9px;border-bottom:1px solid var(--warm)}
.cpl-en{font-family:"Playfair Display",serif;font-size:clamp(1rem,3.8vw,1.25rem);color:var(--dark);line-height:1.6;margin-bottom:7px}
.cpl-hint{font-size:.72rem;color:var(--brown);opacity:.6;margin-bottom:13px}

/* COSTRUTTORE */
.cos-built{min-height:50px;border:2px dashed rgba(200,146,58,.4);border-radius:12px;padding:8px;display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center;background:rgba(200,146,58,.02)}
.cos-empty{font-size:.73rem;color:var(--brown);opacity:.35;width:100%;text-align:center;padding:6px 0}
.cos-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.chip{background:var(--warm);border:1px solid rgba(200,146,58,.3);border-radius:20px;padding:8px 13px;font-family:"Nunito",sans-serif;font-size:.84rem;font-weight:700;color:var(--dark);cursor:pointer;transition:all .15s}
.chip.placed{opacity:.22;cursor:default}
.chip-placed{background:var(--gold);color:#fff;border:1px solid var(--gold);border-radius:20px;padding:8px 13px;font-family:"Nunito",sans-serif;font-size:.84rem;font-weight:700;cursor:pointer}

/* DETTATO */
.det-center{text-align:center;padding:8px 0 14px}
.speak-big{width:78px;height:78px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border-radius:50%;border:none;font-size:2.1rem;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px;box-shadow:0 4px 16px rgba(200,146,58,.33);transition:transform .15s}
.speak-big:active{transform:scale(.88)}

/* INPUTS */
.ex-input{width:100%;border:2px solid var(--warm);border-radius:12px;padding:12px 15px;font-family:"Nunito",sans-serif;font-size:1rem;font-weight:700;color:var(--dark);background:#fff;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.ex-input:focus{border-color:var(--gold)}
.ex-input.ok{border-color:var(--green);background:rgba(58,125,82,.03)}
.ex-input.ko{border-color:var(--red);background:rgba(184,64,64,.03)}
.feedback{font-size:.82rem;font-weight:800;margin:9px 0;min-height:18px}
.feedback.ok{color:var(--green)}
.feedback.ko{color:var(--red)}

/* RESULT */
.res-hero{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:28px 20px;text-align:center;color:#fff;margin-bottom:14px}
.res-stars{font-size:2.2rem;letter-spacing:6px;margin-bottom:8px}
.res-title{font-family:"Playfair Display",serif;font-size:1.3rem;color:var(--gold-l);margin-bottom:4px}
.res-pct{font-size:3.3rem;font-weight:800;color:var(--gold-l);margin:10px 0 3px}
.res-sub{font-size:.8rem;opacity:.6}

/* DIZIONARIO */
.dict-search{width:100%;border:2px solid var(--warm);border-radius:50px;padding:11px 18px;font-family:"Nunito",sans-serif;font-size:.92rem;outline:none;background:#fff;margin-bottom:14px;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.dict-search:focus{border-color:var(--gold)}
.dict-item{background:#fff;border-radius:14px;padding:13px 15px;margin-bottom:8px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px}
.dict-it{font-weight:700;font-size:.88rem;flex:1}
.dict-en{font-family:"Playfair Display",serif;font-size:.95rem;color:var(--gold-d);flex:1}
.dict-ph{font-size:.7rem;color:var(--brown);opacity:.65;font-style:italic;flex:1}
.dict-del{background:none;border:none;font-size:1.1rem;color:var(--red);cursor:pointer;opacity:.5;padding:4px;flex-shrink:0}
.dict-del:active{opacity:1}
.dict-speak{background:none;border:none;font-size:1rem;cursor:pointer;padding:4px;flex-shrink:0}

.add-form{background:#fff;border-radius:18px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.add-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.add-input{border:2px solid var(--warm);border-radius:12px;padding:10px 13px;font-family:"Nunito",sans-serif;font-size:.88rem;font-weight:700;width:100%;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
.add-input:focus{border-color:var(--gold)}
.add-input-ph{border:2px solid var(--warm);border-radius:12px;padding:10px 13px;font-family:"Nunito",sans-serif;font-size:.88rem;width:100%;outline:none;margin-bottom:10px;-webkit-appearance:none;appearance:none}
.add-input-ph:focus{border-color:var(--gold)}
.empty-state{text-align:center;padding:32px 16px;color:var(--brown);opacity:.5;font-size:.88rem}

/* BUTTONS */
.btn{padding:12px 24px;border:none;border-radius:50px;font-family:"Nunito",sans-serif;font-size:.9rem;font-weight:800;cursor:pointer;transition:transform .15s;display:inline-block}
.btn:active{transform:scale(.95)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-l));color:#fff;box-shadow:0 3px 12px rgba(200,146,58,.3)}
.btn-outline{background:transparent;color:var(--brown);border:2px solid var(--gold)}
.btn-green{background:var(--green);color:#fff}
.btn-row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;margin-top:13px}
.back-btn{display:inline-flex;align-items:center;gap:5px;background:transparent;border:none;font-family:"Nunito",sans-serif;font-size:.86rem;font-weight:800;color:var(--brown);cursor:pointer;padding:0;margin-bottom:16px}
.speak-sm{background:transparent;border:none;cursor:pointer;font-size:1rem;padding:3px;line-height:1}

/* ── GUIDA ── */
.guida-intro{background:linear-gradient(135deg,var(--dark),#5C3A1A);border-radius:20px;padding:20px;color:#fff;margin-bottom:14px}
.guida-intro h2{font-family:"Playfair Display",serif;font-size:1.15rem;color:var(--gold-l);margin-bottom:7px}
.guida-intro p{font-size:.82rem;opacity:.78;line-height:1.6}
.guida-sec{background:#fff;border-radius:18px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.guida-sec-head{display:flex;align-items:center;gap:11px;margin-bottom:13px}
.guida-icon{font-size:1.9rem;width:42px;text-align:center;flex-shrink:0}
.guida-sec-title{font-family:"Playfair Display",serif;font-size:1rem;color:var(--dark)}
.guida-sec-sub{font-size:.72rem;color:var(--brown);margin-top:2px}
.gstep{display:flex;gap:11px;margin-bottom:11px;align-items:flex-start}
.gstep:last-child{margin-bottom:0}
.gstep-num{width:24px;height:24px;background:linear-gradient(135deg,var(--gold),var(--gold-l));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:#fff;flex-shrink:0;margin-top:2px}
.gstep-text{font-size:.81rem;line-height:1.6;color:var(--dark)}
.gstep-text strong{color:var(--gold);font-weight:800}
.mode-row-g{display:flex;gap:11px;align-items:flex-start;padding:10px 12px;background:var(--warm);border-radius:11px;margin-bottom:8px}
.mode-row-g:last-child{margin-bottom:0}
.mode-row-g-icon{font-size:1.3rem;flex-shrink:0;margin-top:1px}
.mode-row-g-info strong{font-size:.84rem;font-weight:800;color:var(--dark);display:block;margin-bottom:2px}
.mode-row-g-info span{font-size:.74rem;color:var(--brown);line-height:1.45}
.routine-g{background:linear-gradient(135deg,rgba(58,125,82,.07),rgba(58,125,82,.01));border:1px solid rgba(58,125,82,.2);border-radius:16px;padding:16px;margin-bottom:12px}
.routine-g h3{font-family:"Playfair Display",serif;font-size:.97rem;color:var(--green);margin-bottom:11px}
.routine-row-g{display:flex;gap:9px;align-items:flex-start;margin-bottom:9px;font-size:.8rem;line-height:1.5}
.routine-row-g:last-child{margin-bottom:0}
.ttime{background:var(--green);color:#fff;border-radius:7px;padding:3px 8px;font-size:.68rem;font-weight:800;white-space:nowrap;flex-shrink:0;margin-top:2px}
.save-g{background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:16px;color:#fff;margin-bottom:12px}
.save-g h3{font-family:"Playfair Display",serif;font-size:.97rem;color:#E8B96A;margin-bottom:9px}
.save-row-g{font-size:.78rem;opacity:.8;line-height:1.5;margin-bottom:6px;padding-left:13px;position:relative}
.save-row-g::before{content:"›";position:absolute;left:0;color:#E8B96A;font-weight:800}
.install-g{background:#fff;border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.install-g h3{font-family:"Playfair Display",serif;font-size:.97rem;color:var(--dark);margin-bottom:13px}
.device-g{margin-bottom:13px;padding-bottom:13px;border-bottom:1px solid var(--warm)}
.device-g:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.device-g-name{font-size:.8rem;font-weight:800;color:var(--blue);margin-bottom:6px}
.device-g-step{font-size:.77rem;color:var(--dark);line-height:1.55;margin-bottom:4px;padding-left:13px;position:relative}
.device-g-step::before{content:"•";position:absolute;left:0;color:var(--gold);font-weight:800}
</style>
</head>
<body>
<div id="app">
<div class="page-wrap" id="pageWrap">

<!-- ═══════════════════ HOME ═══════════════════ -->
<div id="sec-home" class="section active">
  <div class="top-bar">
    <h1>📚 Inglese Pareto</h1>
    <p>Metodo Pareto · 300 parole · 12 mesi · 20 min/giorno</p>
  </div>
  <div class="container" id="homeContent"></div>
</div>

<!-- ═══════════════════ PIANO ═══════════════════ -->
<div id="sec-piano" class="section">
  <div class="top-bar">
    <h1>📅 Piano 12 Mesi</h1>
    <p>20 minuti serali + Extra ogni giorno</p>
  </div>
  <div class="container" id="pianoContent"></div>
</div>

<!-- ═══════════════════ ESERCIZI ═══════════════════ -->
<div id="sec-esercizi" class="section">
  <div class="top-bar" id="exTopBar">
    <h1>✏️ Esercizi</h1>
    <p>4 livelli · 5 modalità</p>
  </div>
  <div class="container" id="exContent"></div>

// ======================================================
function speak(text){
  if(!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=0.78;
  speechSynthesis.speak(u);
}
function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function pct(a,b){ return b>0?Math.round(a/b*100):0; }
function escQ(s){ return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function starStr(n){ var s=''; for(var i=0;i<3;i++) s+=(i<n?'⭐':'☆'); return s; }

function saveScore(lvl,mode,score,total){
  var p=total>0?score/total:0;
  var key='ip_'+lvl+'_'+mode;
  var prev=parseFloat(localStorage.getItem(key)||'0');
  if(p>prev) localStorage.setItem(key, p.toFixed(2));
}
function getScore(lvl,mode){
  var v=localStorage.getItem('ip_'+lvl+'_'+mode);
  return v!==null?parseFloat(v):null;
}
function getLevelProg(lvl){
  var modes=['flashcard','quiz','completa','costruttore','dettato'];
  var cnt=0;
  modes.forEach(function(m){ if(getScore(lvl,m)!==null) cnt++; });
  return cnt/modes.length;
}
function getLevelStars(lvl){
  var modes=['flashcard','quiz','completa','costruttore','dettato'];
  var done=[];
  modes.forEach(function(m){ var s=getScore(lvl,m); if(s!==null) done.push(s); });
  if(!done.length) return 0;
  var avg=done.reduce(function(a,b){return a+b;},0)/done.length;
  if(avg>=0.9) return 3; if(avg>=0.6) return 2; return 1;
}

// Streak
function getStreak(){
  var today=new Date(); today.setHours(0,0,0,0);
  var last=localStorage.getItem('lastStudy');
  var streak=parseInt(localStorage.getItem('streak')||'0');
  if(!last) return streak;
  var lastD=new Date(parseInt(last)); lastD.setHours(0,0,0,0);
  var diff=(today-lastD)/(1000*60*60*24);
  if(diff>1) return 0; // streak broken
  return streak;
}
function markStudyToday(){
  var today=new Date(); today.setHours(0,0,0,0);
  var last=localStorage.getItem('lastStudy');
  var streak=parseInt(localStorage.getItem('streak')||'0');
  if(last){
    var lastD=new Date(parseInt(last)); lastD.setHours(0,0,0,0);
    var diff=(today-lastD)/(1000*60*60*24);
    if(diff===1) streak++;
    else if(diff>1) streak=1;
    // diff===0 → same day, don't change
  } else { streak=1; }
  localStorage.setItem('streak',streak);
  localStorage.setItem('lastStudy',today.getTime());
}

function showSection(id, tabEl){
  document.querySelectorAll('.section').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('sec-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(function(t){ t.classList.remove('active'); });
  if(tabEl) tabEl.classList.add('active');
  else {
    var tab = document.querySelector('[data-sec="'+id+'"]');
    if(tab) tab.classList.add('active');
  }
  currentSection = id;
  document.getElementById('pageWrap').scrollTop = 0;

  if(id==='home') renderHome();
  else if(id==='piano') renderPiano();
  else if(id==='esercizi') renderLevels();
  else if(id==='dizionario') renderDict();
  else if(id==='guida') renderGuida();
}

function gotoEsercizi(lvl, mode){
  showSection('esercizi', null);
  if(lvl!==undefined){
    EX.level=lvl;
    if(mode) startMode(mode);
    else renderModes();
  }
}

// ESERCIZI - LIVELLI
// ======================================================
var MODES_DEF=[
  {id:'flashcard',name:'Flashcard',icon:'🃏',desc:'Vedi e memorizza'},
  {id:'quiz',name:'Quiz',icon:'❓',desc:'4 opzioni'},
  {id:'completa',name:'Completa',icon:'✏️',desc:'Riempi il vuoto'},
  {id:'costruttore',name:'Costruttore',icon:'🧩',desc:'Costruisci la frase'},
  {id:'dettato',name:'Dettato',icon:'🎧',desc:'Ascolta e scrivi'}
];

function renderLevels(){

    var m=MONTHS[i];

    html+='<div class="lv-name">Mese '+(i+1)+' · '+m.name+' '+starStr(stars)+'</div>';
    html+='<div class="lv-sub">'+(isCurrent?'⭐ Mese corrente · ':'')+m.vocab.length+' parole'+(isLocked?' · Bloccato':'')+'</div>';

}

function exSelectLevel(id){
  EX.level=id;
  renderModes();
}

function renderModes(){
  var m=MONTHS[EX.level];
  document.getElementById('exTopBar').innerHTML='<h1>'+MONTH_ICONS[EX.level]+' Mese '+(EX.level+1)+'</h1><p>'+m.name+'</p>';
  var html='';
  html+='<button class="back-btn" onclick="renderLevels()">← Mesi</button>';
  html+='<div class="mode-grid">';
  MODES_DEF.forEach(function(md){
    var sc=getScore(EX.level,md.id);

    html+='<div class="mode-cell" onclick="startMode(''+md.id+'')"><div class="mi">'+md.icon+'</div><div class="mn">'+md.name+'</div><div class="md">'+md.desc+'</div>'+badge+'</div>';
  });
  html+='</div>';
  document.getElementById('exContent').innerHTML=html;
}

// ======================================================
// START MODE
// ======================================================
function startMode(modeId){
  EX.mode=modeId; EX.idx=0; EX.score=0; EX.answered=false; EX.fcRevealed=false;
  var words=MONTHS[EX.level].vocab;
  if(modeId==='flashcard'){ EX.queue=shuffle(words); EX.total=EX.queue.length; }
  else if(modeId==='quiz'){ EX.queue=shuffle(words).slice(0,Math.min(10,words.length)); EX.total=EX.queue.length; }
  else if(modeId==='completa'){ EX.queue=shuffle(COMPLETA[EX.level]||[]); EX.total=EX.queue.length; }
  else if(modeId==='costruttore'){ EX.queue=shuffle(COSTRUTTORE[EX.level]||[]); EX.total=EX.queue.length; }
  else if(modeId==='dettato'){ EX.queue=shuffle(words).slice(0,Math.min(10,words.length)); EX.total=EX.queue.length; }
  markStudyToday();
  renderExercise();
}

function restartMode(){ startMode(EX.mode); }

// ======================================================
// EXERCISE ENGINE
// ======================================================
function exHeader(){
  return '<button class="back-btn" onclick="renderModes()">← Modalità</button>'+
    '<div class="ex-hdr"><span class="ex-ctr">'+(EX.idx+1)+' / '+EX.total+'</span><span class="ex-sc">✓ '+EX.score+'</span></div>'+
    '<div class="ex-prog"><div class="ex-prog-fill" id="xfill" style="width:'+(EX.total>0?(EX.idx/EX.total*100):0)+'%"></div></div>';
}

function renderExercise(){
  if(EX.idx>=EX.total){ showResult(); return; }
  EX.answered=false;
  var item=EX.queue[EX.idx];
  if(EX.mode==='flashcard') renderFlashcard(item);
  else if(EX.mode==='quiz') renderQuiz(item);
  else if(EX.mode==='completa') renderCompleta(item);
  else if(EX.mode==='costruttore') renderCostruttore(item);
  else if(EX.mode==='dettato') renderDettato(item);
  document.getElementById('pageWrap').scrollTop=0;
}

// ── FLASHCARD ──
function renderFlashcard(item){
  EX.fcRevealed=false;
  var html=exHeader();
  html+='<div class="fc" id="fcCard" onclick="toggleFC()"><div id="fcF"><div class="fc-lbl">Italiano</div><div class="fc-word">'+item.it+'</div><div class="fc-hint">Tocca per vedere in inglese</div></div><div id="fcB" style="display:none"><div class="fc-lbl">Inglese</div><div class="fc-word">'+item.en+'</div><div class="fc-ph">['+item.ph+']</div></div></div>';
  html+='<div style="text-align:center;margin-bottom:14px"><button class="speak-sm" onclick="speak(\''+escQ(item.en)+'\');event.stopPropagation()">🔊 Pronuncia</button></div>';
  html+='<div class="btn-row">';
  if(EX.idx>0) html+='<button class="btn btn-outline" onclick="fcPrev()">← Indietro</button>';
  html+='<button class="btn btn-gold" onclick="fcNext()">'+(EX.idx===EX.total-1?'Fine ✓':'Avanti →')+'</button>';
  html+='</div>';
  document.getElementById('exContent').innerHTML=html;
}
function toggleFC(){
  EX.fcRevealed=!EX.fcRevealed;
  var card=document.getElementById('fcCard');
  var f=document.getElementById('fcF'); var b=document.getElementById('fcB');
  if(!card||!f||!b) return;
  if(EX.fcRevealed){ card.classList.add('revealed'); f.style.display='none'; b.style.display='block'; speak(EX.queue[EX.idx].en); }
  else { card.classList.remove('revealed'); f.style.display='block'; b.style.display='none'; }
}
function fcNext(){ EX.score++; EX.idx++; renderExercise(); }
function fcPrev(){ if(EX.idx>0){ EX.score=Math.max(0,EX.score-1); EX.idx--; renderExercise(); } }

// ── QUIZ ──
function renderQuiz(item){
  var allWords=MONTHS[EX.level].vocab;
  var wrong=shuffle(allWords.filter(function(w){ return w.en!==item.en; })).slice(0,3);
  var opts=shuffle([item].concat(wrong));
  var html=exHeader();
  html+='<div class="quiz-q"><div class="quiz-lbl">Come si dice in inglese?</div><div class="quiz-it">'+item.it+'</div><div style="margin-top:6px"><button class="speak-sm" onclick="speak(\''+escQ(item.en)+'\')">🔊</button></div></div>';
  html+='<div class="quiz-opts">';
  opts.forEach(function(opt,i){
    html+='<button class="qopt" id="qo'+i+'" onclick="answerQuiz('+i+',this,\''+escQ(opt.en)+'\',\''+escQ(item.en)+'\')">'+opt.en+'</button>';
  });
  html+='</div>';
  document.getElementById('exContent').innerHTML=html;
}
function answerQuiz(i,btn,chosen,correct){
  if(EX.answered) return;
  EX.answered=true;
  document.querySelectorAll('.qopt').forEach(function(b){ b.disabled=true; });
  var ok=chosen.toLowerCase()===correct.toLowerCase();
  if(ok){ btn.classList.add('correct'); EX.score++; speak(correct); setTimeout(function(){ EX.idx++; renderExercise(); },900); }
  else { btn.classList.add('wrong'); document.querySelectorAll('.qopt').forEach(function(b){ if(b.textContent.toLowerCase()===correct.toLowerCase()) b.classList.add('correct'); }); speak(correct); setTimeout(function(){ EX.idx++; renderExercise(); },1600); }
}

// ── COMPLETA ──
function renderCompleta(item){
  var displayed=item.en.replace('___','<span style="display:inline-block;min-width:64px;border-bottom:2px solid var(--gold);text-align:center;color:var(--gold)">___</span>');
  var html=exHeader();
  html+='<div class="cpl-box">';
  html+='<div class="cpl-it">🇮🇹 '+item.it+'</div>';
  html+='<div class="cpl-en">'+displayed+'</div>';
  html+='<div class="cpl-hint">💡 '+item.hint+'</div>';
  html+='<input type="text" class="ex-input" id="ci" placeholder="Scrivi la parola mancante…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">';
  html+='<div class="feedback" id="cf"></div>';
  html+='<div class="btn-row"><button class="btn btn-gold" onclick="checkCompleta()">Controlla ✓</button></div>';
  html+='</div>';
  document.getElementById('exContent').innerHTML=html;
  var inp=document.getElementById('ci');
  if(inp){ inp.focus(); inp.addEventListener('keydown',function(e){ if(e.key==='Enter') checkCompleta(); }); }
}
function checkCompleta(){
  if(EX.answered) return;
  var inp=document.getElementById('ci'); var fb=document.getElementById('cf');
  if(!inp||!fb) return;
  var val=inp.value.trim().toLowerCase(); var correct=EX.queue[EX.idx].blank.toLowerCase();
  EX.answered=true;
  if(val===correct){ inp.classList.add('ok'); fb.className='feedback ok'; fb.textContent='✓ Corretto!'; EX.score++; speak(EX.queue[EX.idx].en.replace('___',EX.queue[EX.idx].blank)); setTimeout(function(){ EX.idx++; renderExercise(); },1000); }
  else { inp.classList.add('ko'); fb.className='feedback ko'; fb.textContent='✗ Corretto: "'+EX.queue[EX.idx].blank+'"'; speak(EX.queue[EX.idx].en.replace('___',EX.queue[EX.idx].blank)); setTimeout(function(){ EX.idx++; renderExercise(); },2200); }
}

// ── COSTRUTTORE ──
function renderCostruttore(item){
  EX.cosAllWords=shuffle(item.words.concat(item.extras)); EX.cosUsed=[]; EX.cosBuilt=[];
  drawCostruttore(item);
}
function drawCostruttore(item){
  var html=exHeader();
  html+='<div class="card">';
  html+='<div class="cpl-it" style="margin-bottom:10px">🇮🇹 '+item.it+'</div>';
  html+='<div class="cos-built" id="cosB">';
  if(!EX.cosBuilt.length) html+='<span class="cos-empty">Tocca le parole qui sotto</span>';
  else EX.cosBuilt.forEach(function(b,i){ html+='<button class="chip-placed" onclick="cosRemove('+i+')">'+b.word+' ×</button>'; });
  html+='</div>';
  html+='<div class="cos-chips">';
  EX.cosAllWords.forEach(function(w,i){
    var used=EX.cosUsed.indexOf(i)>=0;
    html+='<button class="chip'+(used?' placed':'')+'" '+(used?'disabled':'')+' onclick="cosAdd(\''+escQ(w)+'\','+i+')">'+w+'</button>';
  });
  html+='</div>';
  html+='<div class="feedback" id="cosF"></div>';
  html+='<div class="btn-row"><button class="btn btn-outline" onclick="cosClear()">Cancella</button><button class="btn btn-gold" onclick="checkCos()">Controlla ✓</button></div>';
  html+='</div>';
  document.getElementById('exContent').innerHTML=html;
}
function cosAdd(word,chipIdx){
  if(EX.answered||EX.cosUsed.indexOf(chipIdx)>=0) return;
  EX.cosUsed.push(chipIdx); EX.cosBuilt.push({word:word,chipIdx:chipIdx});
  drawCostruttore(EX.queue[EX.idx]);
}
function cosRemove(bi){
  if(EX.answered) return;
  EX.cosUsed=EX.cosUsed.filter(function(i){ return i!==EX.cosBuilt[bi].chipIdx; });
  EX.cosBuilt.splice(bi,1); drawCostruttore(EX.queue[EX.idx]);
}
function cosClear(){ if(EX.answered) return; EX.cosUsed=[]; EX.cosBuilt=[]; drawCostruttore(EX.queue[EX.idx]); }
function checkCos(){
  if(EX.answered) return;
  var item=EX.queue[EX.idx];
  var built=EX.cosBuilt.map(function(b){ return b.word.toLowerCase(); }).join(' ');
  var correct=item.words.map(function(w){ return w.toLowerCase(); }).join(' ');
  var fb=document.getElementById('cosF'); if(!fb) return;
  EX.answered=true;
  if(built===correct){ fb.className='feedback ok'; fb.textContent='✓ Corretto! "'+item.words.join(' ')+'"'; EX.score++; speak(item.words.join(' ')); setTimeout(function(){ EX.idx++; renderExercise(); },1400); }
  else { fb.className='feedback ko'; fb.textContent='✗ Corretto: "'+item.words.join(' ')+'"'; speak(item.words.join(' ')); setTimeout(function(){ EX.idx++; renderExercise(); },2400); }
}

// ── DETTATO ──
function renderDettato(item){
  var html=exHeader();
  html+='<div class="card">';
  html+='<div class="det-center"><button class="speak-big" onclick="speak(\''+escQ(item.en)+'\')">🔊</button><div style="font-size:.76rem;color:var(--brown);opacity:.6">Ascolta e scrivi quello che senti</div></div>';
  html+='<input type="text" class="ex-input" id="di" placeholder="Scrivi in inglese…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">';
  html+='<div class="feedback" id="df"></div>';
  html+='<div class="btn-row"><button class="btn btn-gold" onclick="checkDet()">Controlla ✓</button></div>';
  html+='</div>';
  document.getElementById('exContent').innerHTML=html;
  var inp=document.getElementById('di');
  if(inp) inp.addEventListener('keydown',function(e){ if(e.key==='Enter') checkDet(); });
  setTimeout(function(){ speak(item.en); },400);
}
function checkDet(){
  if(EX.answered) return;
  var inp=document.getElementById('di'); var fb=document.getElementById('df');
  if(!inp||!fb) return;
  var val=inp.value.trim().toLowerCase().replace(/[.,!?]/g,'');
  var correct=EX.queue[EX.idx].en.toLowerCase().replace(/[.,!?]/g,'');
  EX.answered=true;
  if(val===correct){ inp.classList.add('ok'); fb.className='feedback ok'; fb.textContent='✓ Corretto!'; EX.score++; setTimeout(function(){ EX.idx++; renderExercise(); },1000); }
  else { inp.classList.add('ko'); fb.className='feedback ko'; fb.textContent='✗ Corretto: "'+EX.queue[EX.idx].en+'"'; speak(EX.queue[EX.idx].en); setTimeout(function(){ EX.idx++; renderExercise(); },2200); }
}

// ── RESULT ──
function showResult(){
  saveScore(EX.level,EX.mode,EX.score,EX.total);
  var p=pct(EX.score,EX.total);
  var stars=p>=90?3:p>=60?2:p>=30?1:0;
  var titles=['Continua a provare 💪','Bene, continua così 👍','Ottimo! 🎉','Perfetto! ⭐'];
  var ml=['flashcard','quiz','completa','costruttore','dettato'];
  var mn=['Flashcard','Quiz','Completa','Costruttore','Dettato'];

  var html='<div class="res-hero"><div class="res-stars">'+starStr(stars)+'</div><div class="res-title">'+titles[stars]+'</div><div class="res-pct">'+p+'%</div><div class="res-sub">'+EX.score+' corrette su '+EX.total+'</div></div>';
  html+='<div class="card"><div class="card-title">Progresso su '+LEVELS[EX.level].name+'</div>';
  ml.forEach(function(m,i){
    var sc=getScore(EX.level,m); var isCur=m===EX.mode;
    var valStr=sc!==null?Math.round(sc*100)+'%':'—';
    var cls=sc===null?'':sc>=0.7?'color:var(--green)':'color:var(--red)';
    if(isCur) cls=p>=70?'color:var(--green)':'color:var(--red)';
    html+='<div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:.82rem"><span style="font-weight:700;color:var(--brown)">'+(isCur?'→ ':'')+mn[i]+'</span><span style="font-weight:800;'+cls+'">'+(isCur?p+'%':valStr)+'</span></div>';
  });
  html+='</div>';
  html+='<div class="btn-row"><button class="btn btn-outline" onclick="restartMode()">Riprova</button><button class="btn btn-gold" onclick="renderModes()">Modalità</button></div>';
  document.getElementById('exContent').innerHTML=html;
  document.getElementById('pageWrap').scrollTop=0;
}

// ======================================================
// DIZIONARIO
// ======================================================
function getDictWords(){
  try{ return JSON.parse(localStorage.getItem('myDict')||'[]'); }
  catch(e){ return []; }
}
function saveDictWords(arr){ localStorage.setItem('myDict',JSON.stringify(arr)); }

function renderDict(){
  var words=getDictWords();
  var query=(document.getElementById('dSearch')||{}).value||'';

  var html='';
  html+='<div class="add-form"><div class="card-title">Aggiungi una parola</div>';
  html+='<div class="add-row"><input class="add-input" id="addIt" placeholder="Italiano" autocorrect="off"><input class="add-input" id="addEn" placeholder="English" autocorrect="off" autocapitalize="off"></div>';
  html+='<input class="add-input-ph" id="addPh" placeholder="Pronuncia italiana (es. HAUS)" autocorrect="off" autocapitalize="off">';
  html+='<button class="btn btn-gold" style="width:100%" onclick="dictAdd()">+ Aggiungi</button>';
  html+='</div>';

  html+='<input class="dict-search" id="dSearch" placeholder="🔍 Cerca…" oninput="dictFilter(this.value)" value="'+escQ(query)+'">';

  var filtered=words.filter(function(w){
    if(!query) return true;
    var q=query.toLowerCase();
    return w.it.toLowerCase().includes(q)||w.en.toLowerCase().includes(q);
  });

  if(!filtered.length){
    if(words.length===0) html+='<div class="empty-state">Nessuna parola salvata.<br>Aggiungi le prime parole personali!</div>';
    else html+='<div class="empty-state">Nessun risultato per "'+query+'"</div>';
  } else {
    filtered.forEach(function(w,i){
      var realIdx=words.indexOf(w);
      html+='<div class="dict-item">';
      html+='<span class="dict-it">'+w.it+'</span>';
      html+='<span class="dict-en">'+w.en+'</span>';
      html+='<span class="dict-ph">'+w.ph+'</span>';
      html+='<button class="dict-speak" onclick="speak(\''+escQ(w.en)+'\')">🔊</button>';
      html+='<button class="dict-del" onclick="dictDelete('+realIdx+')" title="Elimina">✕</button>';
      html+='</div>';
    });
  }

  document.getElementById('dictContent').innerHTML=html;
}

function dictFilter(q){
  var words=getDictWords();
  var filtered=words.filter(function(w){
    if(!q) return true;
    var qq=q.toLowerCase();
    return w.it.toLowerCase().includes(qq)||w.en.toLowerCase().includes(qq);
  });

  var listEl=document.querySelector('#dictContent .dict-item');
  // re-render just the list part
  var addForm=document.querySelector('.add-form');
  var search=document.getElementById('dSearch');
  var existing=document.querySelectorAll('.dict-item, .empty-state');
  existing.forEach(function(el){ el.remove(); });

  var words2=getDictWords();
  var container=document.getElementById('dictContent');
  if(!filtered.length){
    var d=document.createElement('div');
    d.className='empty-state';
    d.innerHTML=words2.length===0?'Nessuna parola salvata.<br>Aggiungi le prime parole personali!':'Nessun risultato per "'+q+'"';
    container.appendChild(d);
  } else {
    filtered.forEach(function(w){
      var realIdx=words2.indexOf(w);
      var d=document.createElement('div');
      d.className='dict-item';
      d.innerHTML='<span class="dict-it">'+w.it+'</span><span class="dict-en">'+w.en+'</span><span class="dict-ph">'+w.ph+'</span><button class="dict-speak" onclick="speak(\''+escQ(w.en)+'\')">🔊</button><button class="dict-del" onclick="dictDelete('+realIdx+')" title="Elimina">✕</button>';
      container.appendChild(d);
    });
  }
}

function dictAdd(){
  var it=(document.getElementById('addIt').value||'').trim();
  var en=(document.getElementById('addEn').value||'').trim();
  var ph=(document.getElementById('addPh').value||'').trim();
  if(!it||!en){ alert('Inserisci almeno italiano e inglese.'); return; }
  var words=getDictWords();
  words.unshift({it:it,en:en,ph:ph||'—'});
  saveDictWords(words);
  document.getElementById('addIt').value='';
  document.getElementById('addEn').value='';
  document.getElementById('addPh').value='';
  renderDict();
}

function dictDelete(idx){
  var words=getDictWords();
  words.splice(idx,1);
  saveDictWords(words);
  renderDict();
}

renderHome();
